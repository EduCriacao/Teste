name: Hello Runner

on:
  workflow_dispatch:

jobs:
  hello:
    runs-on: [self-hosted, educriacao, whisper]
    steps:
      - name: Say hello
        shell: powershell
        run: Write-Host "hello from educriacao-local em $env:COMPUTERNAME as $env:USERNAME"
      - name: Show working directory
        shell: powershell
        run: Get-Location
      - name: Check G drive
        shell: powershell
        run: if (Test-Path "G:\Meu Drive") { Write-Host "G drive OK" } else { Write-Host "G drive NAO ACESSIVEL" }

  
